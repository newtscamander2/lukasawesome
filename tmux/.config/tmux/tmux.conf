# ~/.config/tmux/tmux.conf  (tmux >= 3.1)
# Catppuccin Mocha flavoured, no external plugins required.

# --- Prefix: Ctrl-a (easier than Ctrl-b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,alacritty:Tc"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on

# --- Splits: | and - , keep current path ---
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation: vim-style ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# --- vi copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Catppuccin Mocha colours ---
mauve="#cba6f7"
blue="#89b4fa"
surface0="#313244"
base="#1e1e2e"
text="#cdd6f4"
overlay0="#6c7086"

set -g status-position top
set -g status-style "bg=$base,fg=$text"
set -g status-left "#[bg=$mauve,fg=$base,bold] #S #[bg=$base] "
set -g status-left-length 30
set -g status-right "#[fg=$overlay0]%a %d %b #[fg=$blue]%H:%M "
setw -g window-status-current-format "#[bg=$surface0,fg=$mauve,bold] #I:#W "
setw -g window-status-format "#[fg=$overlay0] #I:#W "
set -g pane-border-style "fg=$surface0"
set -g pane-active-border-style "fg=$mauve"
set -g message-style "bg=$surface0,fg=$text"
