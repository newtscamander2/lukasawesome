# ~/.config/alacritty/alacritty.toml
# Catppuccin Mocha, FiraCode Nerd Font.

[window]
padding = { x = 10, y = 10 }
opacity = 0.95
dynamic_padding = true
decorations = "none"

[scrolling]
history = 10000

[font]
size = 11.0
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold   = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }

# Make Shift+Enter send ESC+CR (used by some TUIs / shells).
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[cursor]
style = { shape = "Block", blinking = "On" }

# --- Catppuccin Mocha palette ---
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"
