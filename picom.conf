# Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.1;
fade-out-step = 0.1;

# General opacity
inactive-opacity = 0.8;
active-opacity = 0.95;

# App-specific opacity
opacity-rule = [
  "80:class_g = 'Alacritty'",
  "80:class_g = 'Brave-browser'",
  "80:window_type = 'normal'"
];

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.75;
shadow-ignore-shaped = false;

shadow-exclude = [
  "class_g = 'Conky'",
  "class_g = 'Polybar'",
  "class_g = 'slop'",
  "name = 'Notification'",
  "class_g = 'awesome'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Backend
backend = "glx";
vsync = true;
