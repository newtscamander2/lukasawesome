<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    FiraCode Nerd Font has no Braille Patterns (U+2800+), which code-minimap
    uses to draw the Neovim minimap. Without help, fontconfig falls back to the
    PROPORTIONAL "DejaVu Sans", which renders as misaligned tofu in a terminal.

    Append MONOSPACE braille-capable fonts to the fallback chain so the minimap
    renders correctly. Adwaita Mono / FreeMono are tried before the proportional
    defaults.
  -->
  <match target="pattern">
    <test name="family"><string>FiraCode Nerd Font</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Adwaita Mono</string>
      <string>FreeMono</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Adwaita Mono</string>
      <string>FreeMono</string>
    </edit>
  </match>
</fontconfig>
